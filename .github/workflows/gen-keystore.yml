name: Generate Release Keystore (one-time, manual)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore
        run: |
          PASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)Aa1!"
          keytool -genkeypair -v \
            -keystore glimpse-release.jks \
            -alias glimpse \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" \
            -keypass "$PASS" \
            -dname "CN=Glimpse, OU=Glimpse, O=Glimpse, L=NA, S=NA, C=IN" > /dev/null 2>&1
          base64 -w0 glimpse-release.jks > glimpse-release.jks.b64
          printf '%s' "$PASS" > glimpse-release.password.txt
          echo "::add-mask::$PASS"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: glimpse-release-keystore
          path: |
            glimpse-release.jks
            glimpse-release.jks.b64
            glimpse-release.password.txt
          retention-days: 1
