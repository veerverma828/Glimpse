name: Generate Release Keystore (one-time, manual)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore glimpse-release.jks \
            -alias glimpse \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ github.run_id }}Aa1!" \
            -keypass "${{ github.run_id }}Aa1!" \
            -dname "CN=Glimpse, OU=Glimpse, O=Glimpse, L=NA, S=NA, C=IN"
          base64 -w0 glimpse-release.jks > glimpse-release.jks.b64
          echo "STORE/KEY PASSWORD: ${{ github.run_id }}Aa1!"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: glimpse-release-keystore
          path: |
            glimpse-release.jks
            glimpse-release.jks.b64
          retention-days: 1
