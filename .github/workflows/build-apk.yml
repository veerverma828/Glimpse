name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install web deps and build
        env:
          CAPACITOR_BUILD: 1
          # baked into the app so it can compare itself against the latest
          # GitHub release and offer an in-app update (see UpdateChecker.jsx)
          VITE_APP_BUILD: ${{ github.run_number }}
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      # Release build signed with a persistent keystore (repo secrets below).
      # Same signature every build -> no more "package conflicts with an
      # existing package" on install. Debug builds sign with a throwaway key
      # regenerated per CI run, which caused that conflict before.
      - name: Decode keystore
        working-directory: client/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build release APK
        working-directory: client/android
        env:
          ORG_GRADLE_PROJECT_androidStoreFile: release.jks
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK with run number
        working-directory: client/android
        run: |
          mkdir -p ../../dist-apk
          cp app/build/outputs/apk/release/app-release.apk \
             ../../dist-apk/glimpse-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glimpse-apk
          path: dist-apk/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Glimpse APK build ${{ github.run_number }}
          files: dist-apk/*.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.

            Install: download the .apk below, transfer to your Android
            phone, and tap to install (allow "install from unknown
            sources" if prompted).
