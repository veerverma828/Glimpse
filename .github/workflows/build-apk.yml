name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install web deps and build
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode keystore
        working-directory: client/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Build signed release APK
        working-directory: client/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Rename APK with run number
        working-directory: client/android
        run: |
          mkdir -p ../../dist-apk
          cp app/build/outputs/apk/release/app-release.apk \
             ../../dist-apk/glimpse-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glimpse-apk
          path: dist-apk/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Glimpse APK build ${{ github.run_number }}
          files: dist-apk/*.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.

            Install: download the .apk below, transfer to your Android
            phone, and tap to install (allow "install from unknown
            sources" if prompted).
