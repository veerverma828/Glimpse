name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install web deps and build
        env:
          CAPACITOR_BUILD: 1
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      # Debug build: Android auto-signs with a throwaway debug key, so this
      # needs no secrets and installs fine for sideloading/testing. Switch to
      # assembleRelease + a real keystore (ANDROID_KEYSTORE_BASE64 etc. as
      # repo secrets) once this is ready to distribute beyond your own device.
      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK with run number
        working-directory: client/android
        run: |
          mkdir -p ../../dist-apk
          cp app/build/outputs/apk/debug/app-debug.apk \
             ../../dist-apk/glimpse-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glimpse-apk
          path: dist-apk/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Glimpse APK build ${{ github.run_number }}
          files: dist-apk/*.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.

            Install: download the .apk below, transfer to your Android
            phone, and tap to install (allow "install from unknown
            sources" if prompted).
